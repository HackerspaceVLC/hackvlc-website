############################# Default Parameters ##########################
[params]
logo = "images/logo.svg"
ogImage = "images/og-image.png"
# Meta data
description = "Makerspace en Valencia: comunidad, tecnología y cultura maker en abierto. Electrónica, robótica, impresión 3D y software libre."
# Google Analytics
google_analytics_id = "" # Your ID
# post share
post_share = true
copyright = "© {year} [Hackerspace Valencia](https://hackvlc.es) · Todo lo que hacemos es AGPL-3.0 · Hecho con ❤️ en Valencia"

# Theme-specific parameters
primaryColor = "#9BC53D"  # Verde del logo
accentColor = "#FFA630"   # Naranja del logo
# darkMode = true  # Uncomment to enable dark mode by default

# Hero section
heroImage = "/images/local-4.webp"
primaryButtonText = "Sobre Nosotros"
primaryButtonURL = "#about"
secondaryButtonText = "Ver Proyectos"
secondaryButtonURL = "#portfolio"

# Map coordinates
mapLatitude = "39.488339464485364"
mapLongitude = "-0.35849245006843755"
mapPlaceName = "Asociación Hackerspace Valencia"

# Custom CSS files
customCSS = ["css/custom.css"]

[taxonomies]
category = "categories"
tag = "tags"

# preloader
[params.preloader]
enable = false
preloader = "images/logo.svg"

# cookies
[params.cookies]
enable = false
expire_days = 2

# Social media links
[params.social]
github = "https://github.com/HackerspaceVLC/"
mastodon = "https://mastodon.social/@Hackerspace_VLC"
instagram = "https://instagram.com/hackvlc"
youtube = "https://www.youtube.com/@asociacionhackerspacevalen2049"
meetup = "https://www.meetup.com/es-ES/hackerspace-valencia/"

################################ Spanish Language ########################
[Languages.es]
languageName = "Español"
languageCode = "es-es"
contentDir = "content/spanish"
see_all_projects_link = "proyectos/"
weight = 1
[Languages.es.params]
description = "Comunidad maker y espacio de aprendizaje tecnológico en Valencia"
email = "hackerspacevlc@gmail.com"
location = "C/ Francisco Martínez, 19 Bajo 46020 Valencia"
primaryButtonText = "Sobre Nosotros"
primaryButtonURL = "/#about"
secondaryButtonText = "Ver Proyectos"
secondaryButtonURL = "/proyectos/"
[Languages.es.sitemap]
priority = 0.9

