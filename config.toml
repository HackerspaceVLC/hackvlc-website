################################# Default configuration ###################
baseURL = "https://hackvlc.es/"
title = "Hackerspace Valencia"
theme = "hackvlc"  # Changed from meghna-hugo to our new hackvlc theme
# post pagination
pagination.pagerSize = "6"
# post excerpt
summaryLength = "15"
# disqus short name
disqusShortname = "" # get your shortname form here : https://disqus.com
# disable language
disableLanguages = []
# default language
defaultContentLanguage = "es"
# Enable URL canonicalization
canonifyURLs = false

############################# Sitemap Configuration ######################
[sitemap]
changefreq = "monthly"
filename = "sitemap.xml"
priority = 0.5

[outputs]
home = ["HTML", "JSON", "SITEMAP"]
section = ["HTML"]
taxonomy = ["HTML"]
term = ["HTML"]

[outputFormats]
[outputFormats.SITEMAP]
mediaType = "application/xml"
baseName = "sitemap"
isPlainText = true
rel = "sitemap"

############################# Plugins ##########################
 # css plugins
 [[params.plugins.css]]
 link = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
 [[params.plugins.css]]
 link = "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"

 # js plugins
 [[params.plugins.js]]
 link = "https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"
 [[params.plugins.js]]
 link = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
 [[params.plugins.js]]
 link = "https://cdn.jsdelivr.net/npm/lozad@1.16.0/dist/lozad.min.js"

# Favicon

[params.favicon]
icon = "favicon.ico"        # Favicon básico

